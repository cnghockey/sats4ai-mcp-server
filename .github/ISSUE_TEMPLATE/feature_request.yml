name: Feature Request
description: Suggest a new tool, model, or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New AI tool / service
        - New model for existing tool
        - Payment / pricing
        - MCP protocol improvement
        - L402 protocol improvement
        - Discovery / documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: How would you or your agent use this feature?
